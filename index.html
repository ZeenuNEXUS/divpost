<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysis</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;

  /* Galaxy + black gradient */
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.15), transparent 40%),
    radial-gradient(circle at bottom, rgba(0,0,0,0.9), #000),
    url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1200');
  background-size:cover;
  background-position:center;
}

.card{
  backdrop-filter:blur(14px);
  background:rgba(0,0,0,0.5);
  border-radius:20px;
  padding:30px;
  width:90%;
  max-width:520px;
  text-align:left;
  box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

.line{
  margin:10px 0;
  font-size:16px;
  opacity:0.9;
}

.highlight{
  margin-top:15px;
  font-weight:600;
  color:#cfcfff;
}

.meta{
  margin-top:20px;
  font-size:12px;
  opacity:0.6;
}

/* Hidden strip */
.reveal-box{
  margin-top:15px;
  background:black;
  color:black;
  padding:8px;
  border-radius:6px;
  text-align:center;
  font-size:13px;
  cursor:pointer;
  user-select:none;
  transition:0.3s;
}

.reveal-box.active{
  color:white;
}

/* Footer */
footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.6;
}

</style>
</head>

<body>

<div class="card">

  <div class="line">144p → normal pic</div>
  <div class="line">240p → okay, decent</div>
  <div class="line">360p → nice… especially Kaj u</div>
  <div class="line">720p → clean shot, Barfi approves</div>
  <div class="highlight">1080p (moon - Poorna) → clarity peak level</div>

  <!-- Hidden joke -->
  <div class="reveal-box" onclick="this.classList.toggle('active')">
    tap to reveal
  </div>

  <div class="meta">This website was created in 13 minutes</div>

</div>

<footer>
  Created by Divyanshu (DivTech)
</footer>

<script>
document.querySelector('.reveal-box').addEventListener('click', function(){
  if(this.classList.contains('active')){
    this.innerText = "This is a joke my friend";
  } else {
    this.innerText = "tap to reveal";
  }
});
</script>

</body>
</html>
