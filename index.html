<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysis</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#eaeaff;

  /* Galaxy aesthetic */
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(173,216,230,0.2), transparent 40%),
    url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=1400');
  background-size:cover;
  background-position:center;
}

.card{
  backdrop-filter:blur(12px);
  background:rgba(0,0,30,0.6);
  border-radius:20px;
  padding:30px;
  width:90%;
  max-width:520px;
  text-align:left;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:20px;
  font-weight:600;
  letter-spacing:1px;
}

.line{
  margin:10px 0;
  font-size:16px;
  opacity:0.9;
}

.highlight{
  margin-top:15px;
  font-weight:600;
  color:#cfd8ff;
}

.meta{
  margin-top:20px;
  font-size:12px;
  opacity:0.7;
}

/* Reveal section */
.reveal-container{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:15px;
}

.reveal-box{
  background:black;
  color:black;
  padding:8px 12px;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
  user-select:none;
  transition:0.3s;
}

.reveal-box.active{
  color:white;
}

.click-text{
  font-size:12px;
  opacity:0.7;
}

/* Footer */
footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.6;
}

</style>
</head>

<body>

<div class="card">

  <h1>Babu The Bigdail Billi Analysis</h1>

  <div class="line">144p → normal pic</div>
  <div class="line">240p → decent clarity</div>
  <div class="line">360p → Barfi stealing attention</div>
  <div class="line">720p → Kaju looks elite here</div>
  <div class="highlight">1080p (moon - Poorna) → peak clarity achieved</div>

  <!-- Reveal -->
  <div class="reveal-container">
    <div class="reveal-box" onclick="toggleReveal(this)">
      hidden message
    </div>
    <div class="click-text">Click here</div>
  </div>

  <div class="meta">This website was created in 8 minutes</div>

</div>

<footer>
  Created by Divyanshu (DivTech)
</footer>

<script>
function toggleReveal(el){
  el.classList.toggle("active");
  if(el.classList.contains("active")){
    el.innerText = "This is A Joke My Dear Friend";
  } else {
    el.innerText = "hidden message";
  }
}
</script>

</body>
</html>
